<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
      }
      main {
        width: min(420px, 92vw);
        background: #fff;
        border: 1px solid #d8deea;
        border-radius: 10px;
        padding: 24px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }
      label {
        display: block;
        margin: 12px 0 6px;
      }
      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #c6cfde;
        border-radius: 8px;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 8px;
        background: #1f4fbf;
        color: #fff;
        cursor: pointer;
      }
      .errors {
        margin-top: 10px;
        color: #9f1328;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ingreso al sistema</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label for="{{ form.username.id_for_label }}">Usuario</label>
        {{ form.username }}
        <label for="{{ form.password.id_for_label }}">Contraseña</label>
        {{ form.password }}
        {% if form.errors %}
          <div class="errors">Credenciales inválidas. Intenta nuevamente.</div>
        {% endif %}
        <button type="submit">Entrar</button>
      </form>
    </main>
  </body>
</html>
